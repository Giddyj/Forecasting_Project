<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Upload Dataset</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 40px;
      color: #1f2937;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 30px;
    }

    .card {
      background: #ffffff;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .hint {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .actions {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #1e40af;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .requirements {
      margin-top: 30px;
      font-size: 14px;
      color: #374151;
    }

    .requirements ul {
      margin-top: 10px;
      padding-left: 20px;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>Upload Dataset</h1>
  <p class="subtitle">
    Upload a CSV or Excel file containing monthly demand data.
  </p>

  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <label for="file">Select file</label>
      <input type="file" name="file" id="file" required>

      <div class="hint">
        Supported formats: <strong>.csv</strong>, <strong>.xlsx</strong>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">
          Upload & Import
        </button>
        <a href="/" class="btn btn-secondary">
          Cancel
        </a>
      </div>
    </form>
  </div>

  <div class="requirements">
    <strong>Dataset requirements:</strong>
    <ul>
      <li>Monthly time-series data</li>
      <li>Date/month column (e.g. YYYY-MM)</li>
      <li>Numeric demand values</li>
    </ul>
  </div>

</div>
</body>
</html>
